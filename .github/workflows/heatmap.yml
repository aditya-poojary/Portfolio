name: Update Heatmap Data

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight UTC
  workflow_dispatch: # Allows manual trigger

jobs:
  update-heatmap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install axios cheerio

      - name: Fetch LeetCode
        run: node scripts/leetcode.js

      - name: Fetch GFG
        run: node scripts/gfg.js

      - name: Combine Heatmaps
        run: node scripts/combine.js

      - name: Commit updated JSON
        run: |
          git config --global user.name "heatmap-bot"
          git config --global user.email "bot@example.com"
          git add .
          git diff --staged --quiet || git commit -m "Update heatmap data"
          git push
