name: Update LeetCode Data

on:
  schedule:
    - cron: "0 0 * * *"  # Runs daily at midnight UTC
  workflow_dispatch:  # Allows manual trigger

jobs:
  update-leetcode:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch LeetCode Data
        run: node scripts/leetcode.js

      - name: Commit updated JSON
        run: |
          git config --global user.name "leetcode-bot"
          git config --global user.email "bot@example.com"
          git add public/data/leetcode.json
          git diff --staged --quiet || git commit -m "Update LeetCode data"
          git push
