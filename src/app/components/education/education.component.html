<div class="mb-20 max-md:mb-16">
  <h3
    class="font-heading text-h3 font-semibold text-text-primary mb-10 flex items-center gap-3"
  >
    <span
      class="inline-flex items-center justify-center w-8 h-8 rounded-lg border border-accent-teal/30"
      style="background: rgba(0, 77, 97, 0.15)"
    >
      <svg
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.8"
        stroke-linecap="round"
        stroke-linejoin="round"
        class="w-4 h-4 text-accent-teal-light"
      >
        <path d="M22 10v6M2 10l10-5 10 5-10 5z" />
        <path d="M6 12v5c3 3 9 3 12 0v-5" />
      </svg>
    </span>
    Education
  </h3>

  <!-- Timeline container -->
  <div class="relative ml-4 max-md:ml-2">
    <!-- Vertical line -->
    <div
      class="absolute left-0 top-2 bottom-2 w-px"
      style="
        background: linear-gradient(
          to bottom,
          var(--color-accent-teal),
          var(--color-accent-ruby),
          transparent
        );
      "
    ></div>

    <!-- Timeline entries -->
    @for (entry of education(); track entry.title) {
      <div class="relative flex gap-8 pb-14 last:pb-0 max-md:gap-5">
        <!-- Dot -->
        <div
          class="relative z-10 mt-1.5 shrink-0 w-3 h-3 rounded-full border-2 -ml-[6px]"
          style="
            border-color: var(--color-accent-teal-light);
            background: var(--color-bg-primary);
            box-shadow: 0 0 12px rgba(0, 77, 97, 0.4);
          "
        ></div>

        <!-- Content card -->
        <div class="flex-1 -mt-1">
          <!-- Period label -->
          <span
            class="font-label text-xs font-medium tracking-wider text-accent-teal-light uppercase mb-2 block"
          >
            {{ entry.period }}
          </span>

          <!-- Title & Subtitle -->
          <h4 class="font-heading text-h4 font-semibold text-text-primary mb-1">
            {{ entry.title }}
          </h4>
          <span class="font-label text-sm text-text-muted block mb-3">
            {{ entry.subtitle }}
          </span>

          <!-- Description -->
          <p class="font-body text-sm text-text-secondary leading-relaxed max-w-xl mb-3">
            {{ entry.description }}
          </p>

          <!-- Highlight badge -->
          @if (entry.highlight) {
            <div
              class="inline-flex items-center gap-2 px-3.5 py-1.5 rounded-lg font-label text-sm font-semibold tracking-wide"
              style="
                background: linear-gradient(
                  135deg,
                  rgba(0, 77, 97, 0.2),
                  rgba(130, 38, 89, 0.12)
                );
                border: 1px solid rgba(0, 110, 138, 0.25);
                color: var(--color-accent-teal-light);
              "
            >
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="w-3.5 h-3.5"
              >
                <polygon
                  points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"
                />
              </svg>
              {{ entry.highlight }}
            </div>
          }
        </div>
      </div>
    }
  </div>
</div>
