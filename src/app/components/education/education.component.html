<!-- ══════════════════════════════════════════════════════════
     EDUCATION — Stacked Glass Cards
     ══════════════════════════════════════════════════════════ -->
<div class="mb-20 max-md:mb-16">
  <h3 class="font-heading text-h3 font-semibold text-text-primary mb-10 flex items-center gap-3">
    <span
      class="inline-flex items-center justify-center w-8 h-8 rounded-lg border border-accent-teal/30"
      style="background: rgba(0, 77, 97, 0.15)"
    >
      <svg
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.8"
        stroke-linecap="round"
        stroke-linejoin="round"
        class="w-4 h-4 text-accent-teal-light"
      >
        <path d="M22 10v6M2 10l10-5 10 5-10 5z" />
        <path d="M6 12v5c3 3 9 3 12 0v-5" />
      </svg>
    </span>
    Education
  </h3>

  <!-- Cards stack -->
  <div class="flex flex-col gap-5">
    @for (entry of education(); track entry.title; let i = $index) {
      <div
        #eduCard
        class="edu-card group relative rounded-xl border border-white/[0.04] transition-all duration-300 hover:border-white/[0.08] hover:-translate-y-0.5 overflow-hidden"
        style="
          background: linear-gradient(135deg, rgba(34, 34, 34, 0.6), rgba(42, 42, 42, 0.3));
          backdrop-filter: blur(8px);
        "
      >
        <!-- Top accent line -->
        <div
          class="absolute top-0 left-0 right-0 h-px"
          style="
            background: linear-gradient(
              90deg,
              transparent,
              var(--color-accent-teal),
              var(--color-accent-ruby),
              transparent
            );
          "
        ></div>

        <div class="p-6 max-md:p-5 flex gap-5">
          <!-- Step indicator -->
          <div
            class="shrink-0 w-10 h-10 rounded-lg flex items-center justify-center font-mono text-sm font-semibold tracking-wider border border-accent-teal/20"
            style="
              color: var(--color-accent-teal-light);
              background: rgba(0, 77, 97, 0.1);
            "
          >
            {{ '0' + (i + 1) }}
          </div>

          <!-- Content -->
          <div class="flex-1 min-w-0">
            <!-- Period -->
            <span
              class="font-label text-xs font-medium tracking-wider text-accent-teal-light uppercase mb-1.5 block"
            >
              {{ entry.period }}
            </span>

            <!-- Institution name -->
            <h4 class="font-heading text-h4 font-semibold text-text-primary mb-1">
              {{ entry.title }}
            </h4>

            <!-- Subtitle (degree/program) -->
            <span class="font-label text-sm text-text-muted block">
              {{ entry.subtitle }}
            </span>

            <!-- Description (if present) -->
            @if (entry.description) {
              <p class="font-body text-sm text-text-secondary leading-relaxed mt-2">
                {{ entry.description }}
              </p>
            }
          </div>

          <!-- Academic cap icon (right side) -->
          <div class="shrink-0 hidden md:flex items-start pt-1">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="w-8 h-8 text-white/[0.04] group-hover:text-accent-teal/20 transition-colors duration-500"
            >
              <path d="M22 10v6M2 10l10-5 10 5-10 5z" />
              <path d="M6 12v5c3 3 9 3 12 0v-5" />
            </svg>
          </div>
        </div>
      </div>
    }
  </div>
</div>
